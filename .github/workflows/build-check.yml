name: Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore PhotoCull.sln

      - name: Build project
        run: dotnet build PhotoCull.sln -c Release --no-restore

      - name: Run tests
        continue-on-error: true
        run: dotnet test tests/PhotoCull.Tests/PhotoCull.Tests.csproj --verbosity detailed --logger "console;verbosity=detailed" --filter "FullyQualifiedName!~AiScorer&FullyQualifiedName!~RawPreviewExtractor"
